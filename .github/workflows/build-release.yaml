name: Build and release

on:
  push:
    branches:
      - master
  release:
    types:
      - created

jobs:
  build-release:
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./webapp
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # @v4.3.0
      - name: Use Node.js 20.x
        uses: actions/setup-node@v4.0.1
        with:
          node-version: 20.x
          cache: "npm"
          cache-dependency-path: webapp/package-lock.json
      - name: Set package.json version
        # Pinned to last stable commit before the node24 runtime bump (oddish PR #4)
        # which broke npm publish on this repo. Revisit once upstream confirms a fix.
        uses: decentraland/oddish-action@914e7c5
        with:
          cwd: ./webapp
          deterministic-snapshot: true
          only-update-versions: true
      - name: Install
        run: npm install
      - name: Build
        env:
          NODE_OPTIONS: "--max_old_space_size=4096"
        run: npm run build
      - name: Publish
        # Pinned — see comment above.
        uses: decentraland/oddish-action@914e7c5
        with:
          cwd: ./webapp/dist
          deterministic-snapshot: true
          registry-url: "https://registry.npmjs.org"
          access: public
          gitlab-token: ${{ secrets.GITLAB_CDN_DEPLOYER_TOKEN }}
          gitlab-pipeline-url: ${{ secrets.GITLAB_CDN_DEPLOYER_URL }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Create Sentry release
        if: github.event_name == 'release' && github.event.action == 'created'
        uses: getsentry/action-release@v1
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          sourcemaps: ${{ github.workspace }}/webapp/dist
          version: "${{ vars.SENTRY_RELEASE_PREFIX }}@${{ github.event.release.tag_name }}"
          url_prefix: "~"
